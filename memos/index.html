<script src="https://fastly.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://fastly.jsdelivr.net/gh/Tokinx/ViewImage/view-image.min.js"></script>
<script type="text/javascript">
  var bbMemos = {
    memos: 'https://memos-api.lct-memos.workers.dev/',
    limit: 10,
    creatorId: 1,
    domId: '#bber'
  };
<p>function normalizeMemos(raw) {<br />
if (Array.isArray(raw)) return raw;<br />
if (Array.isArray(raw.data)) return raw.data;<br />
if (Array.isArray(raw.memos)) return raw.memos;<br />
if (raw.data &amp;&amp; Array.isArray(raw.data.memos)) return raw.data.memos;<br />
return [];<br />
}</p>
<p>function normalizeContent(memo) {<br />
return memo.content || memo.displayContent || memo.memo || ‘’;<br />
}</p>
<p>function normalizeTimestamp(memo) {<br />
if (typeof memo.createdTs === ‘number’) return memo.createdTs * 1000;<br />
if (typeof memo.createTime === ‘string’) return new Date(memo.createTime).getTime();<br />
if (typeof memo.createdAt === ‘string’) return new Date(memo.createdAt).getTime();<br />
return Date.now();<br />
}</p>
<p>function buildApiCandidates() {<br />
var base = bbMemos.memos.endsWith(‘/’) ? bbMemos.memos : bbMemos.memos + ‘/’;<br />
var limit = encodeURIComponent(bbMemos.limit);<br />
var creator = encodeURIComponent(bbMemos.creatorId);<br />
return [<br />
base + ‘api/v1/memos?creatorId=’ + creator + ‘&amp;limit=’ + limit + ‘&amp;rowStatus=NORMAL’,<br />
base + ‘api/v1/memo?creatorId=’ + creator + ‘&amp;limit=’ + limit + ‘&amp;rowStatus=NORMAL’,<br />
base + ‘api/v1/memos?pageSize=’ + limit + ‘&amp;filter=visibility%20%3D%3D%20%22PUBLIC%22’,<br />
base + ‘api/v1/memos?pageSize=’ + limit<br />
];<br />
}</p>
<p>async function fetchWithTimeout(url, timeoutMs) {<br />
var controller = new AbortController();<br />
var timer = setTimeout(function () { controller.abort(); }, timeoutMs);<br />
try {<br />
return await fetch(url, {<br />
headers: { ‘Accept’: ‘application/json’ },<br />
signal: controller.signal<br />
});<br />
} finally {<br />
clearTimeout(timer);<br />
}<br />
}</p>
<p>function renderToolbar(count) {<br />
return ‘<div class="bb-toolbar"><div class="bb-count"><i class="far fa-comment-dots"></i><span>’ + count + ’ memos</span></div><button class="bb-refresh" type="button"><i class="fas fa-sync-alt"></i> Refresh</button></div>';<br />
}</p>
<p>function renderCards(memos) {<br />
return memos.map(function (memo) {<br />
var content = marked.parse(normalizeContent(memo));<br />
var date = new Date(normalizeTimestamp(memo)).toLocaleString();<br />
return ‘<article class="bb-list-item"><div class="bb-content">’ + content + ‘</div><time class="bb-datetime"><i class="far fa-clock"></i><span>’ + date + ‘</span></time></article>’;<br />
}).join(‘’);<br />
}</p>
<p>async function fetchMemos() {<br />
var candidates = buildApiCandidates();<br />
var lastError = null;<br />
for (var i = 0; i &lt; candidates.length; i++) {<br />
try {<br />
var res = await fetchWithTimeout(candidates[i], 9000);<br />
if (!res.ok) throw new Error('HTTP ’ + res.status);<br />
var json = await res.json();<br />
var memos = normalizeMemos(json);<br />
if (memos.length) return memos;<br />
} catch (e) {<br />
lastError = e;<br />
}<br />
}<br />
if (lastError) throw lastError;<br />
return [];<br />
}</p>
<p>async function loadMemos() {<br />
var bber = document.querySelector(bbMemos.domId);<br />
bber.innerHTML = ‘<div class="bb-loading"><i class="fas fa-circle-notch fa-spin"></i>Loading memos…</div>’;<br />
try {<br />
var memos = await fetchMemos();<br />
if (!memos.length) {<br />
bber.innerHTML = ‘<div class="bb-empty"><i class="far fa-folder-open"></i> No memos yet.</div>’;<br />
return;<br />
}<br />
bber.innerHTML = renderToolbar(memos.length) + renderCards(memos);<br />
var refreshButton = bber.querySelector(‘.bb-refresh’);<br />
if (refreshButton) refreshButton.addEventListener(‘click’, loadMemos);<br />
if (window.ViewImage) ViewImage.init(‘.bb-content img’);<br />
} catch (err) {<br />
bber.innerHTML = ‘<div class="bb-error"><i class="fas fa-exclamation-triangle"></i> Failed to load memos.</div>’;<br />
}<br />
}</p>
<p>if (document.readyState === ‘loading’) {<br />
window.addEventListener(‘DOMContentLoaded’, loadMemos);<br />
} else {<br />
loadMemos();<br />
}<br />
</script></p>
